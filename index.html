<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DON BOSCO G.O.A.T.S</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root { --neon: #fbff00; --bosco: #ff0055; --savio: #00d4ff; --ruva: #ffcc00; --thomas: #00ff88; }
    body { font-family: 'Poppins', sans-serif; background: #000; color: white; text-align: center; margin: 0; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 15px; border-radius: 20px; margin: 10px; border: 1px solid rgba(255,255,255,0.1); }
    input, select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #222; color: white; }
    .btn { width: 90%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    .house-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
    .h-btn { padding: 20px; border-radius: 10px; border: none; font-weight: 900; color: #000; }
    #reader { width: 100%; display: none; margin-bottom: 10px; border-radius: 15px; overflow: hidden; }
    
    /* Stats Styling */
    .live-board { display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 12px; }
    .score-box { padding: 10px; border-radius: 10px; min-width: 60px; font-weight: 900; }
    .stat-list { text-align: left; font-size: 13px; margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
    .stat-title { color: var(--neon); font-size: 14px; font-weight: bold; margin-bottom: 5px; display: block; }
  </style>
</head>
<body>
  <div class="glass">
    <h2 style="color:var(--neon); margin:10px 0;">DBPC G.O.A.T.S</h2>
    
    <div id="login-section">
      <select id="dept-select"><option>Loading...</option></select>
      <input type="password" id="pass" placeholder="Password">
      <button class="btn" style="background:var(--neon);" onclick="login()">LOGIN</button>
    </div>

    <div id="main-section" style="display:none;">
      <div class="live-board" id="house-board">
        <div class="score-box" style="background:var(--bosco)">B: <span id="s-bosco">0</span></div>
        <div class="score-box" style="background:var(--savio)">S: <span id="s-savio">0</span></div>
        <div class="score-box" style="background:var(--ruva)">R: <span id="s-ruva">0</span></div>
        <div class="score-box" style="background:var(--thomas)">T: <span id="s-thomas">0</span></div>
      </div>

      <p id="user-display" style="font-weight:bold; margin:5px;"></p>
      
      <div style="display:flex; gap:10px; margin-bottom:10px;">
        <button id="p-btn" class="btn" style="background:var(--thomas);" onclick="setMode('Positive')">+10 Points</button>
        <button id="n-btn" class="btn" style="background:var(--bosco); opacity:0.4;" onclick="setMode('Negative')">-5 Points</button>
      </div>
      
      <button class="btn" onclick="startScan()" style="background:white; color:black; margin-bottom:10px;">📷 OPEN SCANNER</button>
      <div id="reader"></div>
      
      <input type="text" id="stu-name" placeholder="Student Name">
      <div class="house-grid">
        <button class="h-btn" style="background:var(--bosco);" onclick="send('Bosco')">BOSCO</button>
        <button class="h-btn" style="background:var(--savio);" onclick="send('Savio')">SAVIO</button>
        <button class="h-btn" style="background:var(--ruva);" onclick="send('Ruva')">RUVA</button>
        <button class="h-btn" style="background:var(--thomas);" onclick="send('Thomas')">THOMAS</button>
      </div>
      <input type="text" id="teach-name" placeholder="Staff Name">
      <select id="cat-select"><option>Discipline</option><option>Academics</option><option>Sports</option><option>Other</option></select>

      <div class="glass" style="margin-top:20px; border-color:var(--neon);">
        <span class="stat-title">⭐ STAR TEACHERS (TOP 5)</span>
        <div id="star-teachers" class="stat-list">Loading...</div>
        
        <span class="stat-title" style="margin-top:15px;">🏆 ACTIVE DEPTS (BY STUDENTS)</span>
        <div id="active-depts" class="stat-list">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbwtunA6-yhHIQgwjugWnmNPw_OWqAW3m3u6sUHhehuku0jH5W0qjdrxkW1AkUxl897N/exec";
    let mode = "Positive";
    let myDept = "";

    window.onload = async () => {
      const depts = await fetch(URL + "?action=getDepts").then(r => r.json());
      const sel = document.getElementById('dept-select');
      sel.innerHTML = "";
      depts.forEach(d => sel.add(new Option(d, d)));
    };

    async function refreshStats() {
      const stats = await fetch(URL + "?action=getStats").then(r => r.json());
      // Update House Board
      document.getElementById('s-bosco').innerText = stats.houses.Bosco;
      document.getElementById('s-savio').innerText = stats.houses.Savio;
      document.getElementById('s-ruva').innerText = stats.houses.Ruva;
      document.getElementById('s-thomas').innerText = stats.houses.Thomas;

      // Update Teachers
      document.getElementById('star-teachers').innerHTML = stats.teachers.map((t,i) => `${i+1}. ${t.name} (${t.count})`).join('<br>') || "No data yet";
      
      // Update Depts
      document.getElementById('active-depts').innerHTML = stats.depts.map((d,i) => `${i+1}. ${d.name} (${d.students} students)`).join('<br>') || "No data yet";
    }

    function login() {
      myDept = document.getElementById('dept-select').value;
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('main-section').style.display = 'block';
      document.getElementById('user-display').innerText = "Officer: " + myDept;
      refreshStats(); // Load stats on login
    }

    function setMode(m) {
      mode = m;
      document.getElementById('p-btn').style.opacity = m === 'Positive' ? '1' : '0.4';
      document.getElementById('n-btn').style.opacity = m === 'Negative' ? '1' : '0.4';
    }

    function startScan() {
      document.getElementById('reader').style.display = 'block';
      const scanner = new Html5Qrcode("reader");
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
        const p = txt.split('|');
        document.getElementById('stu-name').value = p[2] || p[1] || p[0];
        send(p[0]); // Assumes QR first part is House
        scanner.stop();
        document.getElementById('reader').style.display = 'none';
      });
    }

    function send(house) {
      const sName = document.getElementById('stu-name').value;
      const tName = document.getElementById('teach-name').value;
      if(!sName || !tName) return alert("Missing Info!");

      if(mode === "Positive") confetti();
      
      fetch(URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          action: 'submit',
          payload: { dept: myDept, studentName: sName, teacherName: tName, house: house, type: mode, category: document.getElementById('cat-select').value }
        })
      });
      alert("Point Logged!");
      document.getElementById('stu-name').value = "";
      setTimeout(refreshStats, 2000); // Refresh stats after sending
    }
  </script>
</body>
</html>
