<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBPC G.O.A.T.S 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bosco: #ff0055; --savio: #00d4ff; --ruva: #ffcc00; --thomas: #00ff88; --neon: #fbff00; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; margin: 0; }
        .glass { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin: 10px; }
        .live-card { border: 1px solid; border-radius: 12px; padding: 8px; text-align: center; background: rgba(255,255,255,0.05); }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; background: var(--neon); color: black; font-weight: 900; border: none; cursor: pointer; margin-top: 10px; }
        .popup-receipt { position: fixed; bottom: -220px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 320px; background: white; color: black; padding: 20px; border-radius: 15px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; z-index: 1000; }
        .popup-receipt.show { bottom: 30px; }
        #reader { border-radius: 15px; overflow: hidden; border: 2px solid var(--neon); margin: 15px 0; }
        #cert-wrap { width: 1000px; height: 700px; background: white; color: black; padding: 50px; position: absolute; left: -9999px; border: 15px double #8e6d10; box-sizing: border-box; }
    </style>
</head>
<body onload="initApp()">

    <div id="login-view" class="glass" style="max-width:380px; margin: 50px auto;">
        <h2 style="font-family:'Cinzel'; text-align:center;">G.O.A.T.S LOGIN</h2>
        <select id="user-select" style="width:100%; padding:12px; margin-bottom:10px;"></select>
        <input type="password" id="pass-input" placeholder="Passcode" style="width:100%; padding:12px; border-radius:8px; margin-bottom:15px;">
        <button class="btn-main" onclick="login()">AUTHORIZE ACCESS</button>
    </div>

    <div id="teacher-view" style="display:none;" class="glass">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px;">
            <div class="live-card" style="border-color: var(--bosco);"><small>BOSCO</small><div id="s-bosco">0</div></div>
            <div class="live-card" style="border-color: var(--savio);"><small>SAVIO</small><div id="s-savio">0</div></div>
            <div class="live-card" style="border-color: var(--ruva);"><small>RUVA</small><div id="s-ruva">0</div></div>
            <div class="live-card" style="border-color: var(--thomas);"><small>THOMAS</small><div id="s-thomas">0</div></div>
        </div>
        <input type="text" id="t-name" placeholder="Staff Name (Required)" style="width:100%; padding:10px; margin-bottom:10px;">
        <select id="m-category" style="width:100%; padding:10px; margin-bottom:10px;">
            <option>Academic Excellence</option><option>Discipline</option><option>Assembly</option><option>YouTube</option><option>Dress Code</option>
        </select>
        <div style="display:flex; gap:10px;">
            <button id="btn-neg" class="btn-main" style="background:#400; color:red;" onclick="setMode('Negative')">FINE (-5)</button>
            <button id="btn-pos" class="btn-main" style="border:2px solid var(--thomas);" onclick="setMode('Positive')">AWARD (+10)</button>
        </div>
        <div id="reader"></div>
        <div style="border-top:1px solid #333; margin-top:20px; padding-top:10px;">
            <input type="text" id="man-name" placeholder="Manual Student Name" style="width:100%; padding:10px;">
            <select id="man-house" style="width:100%; padding:10px; margin-top:5px;"><option>Bosco</option><option>Savio</option><option>Ruva</option><option>Thomas</option></select>
            <button class="btn-main" style="background:#222; color:white;" onclick="manualSubmit()">LOG MANUALLY</button>
        </div>
    </div>

    <div id="admin-view" style="display:none;" class="glass">
        <div id="admin-content"></div>
        <button class="btn-main" style="background:#400; color:white;" onclick="location.reload()">LOGOUT</button>
    </div>

    <div id="receipt-box" class="popup-receipt">
        <div style="font-size:10px; border-bottom:1px dashed #ccc; margin-bottom:10px;">OFFICIAL RECEIPT</div>
        <h2 id="r-name">---</h2>
        <h1 id="r-pts" style="margin:5px 0;">+10</h1>
    </div>

    <div id="cert-wrap">
        <center>
            <img id="c-logo" style="height:80px; margin-bottom:10px;">
            <h1 style="font-family:'Cinzel';">DON BOSCO POLYTECHNIC COLLEGE</h1>
            <h2 id="c-type" style="font-family:'Great Vibes'; font-size:60px; color:#8e6d10;"></h2>
            <p style="font-size:20px;">Proudly conferred upon</p>
            <h1 id="c-name" style="font-size:45px; text-decoration:underline;"></h1>
            <p id="c-desc" style="font-style:italic; padding:0 80px;"></p>
            <div style="display:flex; justify-content:space-between; margin-top:80px; padding:0 50px;">
                <div>Date: <b id="c-date"></b></div>
                <div><img id="c-sig" style="height:60px;"><br><b>Principal</b></div>
            </div>
        </center>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkwKgZ9XuU_KRl-K5vP79dGhNsbGM-1KKo034x25S7tgWCUEv9F4kXCdfyIgcXo-fB/exec";
        let curMode = "Positive", sessionScores = {Bosco:0, Savio:0, Ruva:0, Thomas:0}, imgData = {};

        async function initApp() {
            const r = await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'getInitialData'})});
            const d = await r.json(); imgData = d.images;
            const sel = document.getElementById('user-select'); sel.innerHTML = "";
            d.departments.forEach(dept => sel.add(new Option(dept, dept)));
        }

        async function login() {
            const r = await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'login', user:document.getElementById('user-select').value, pass:document.getElementById('pass-input').value})});
            const d = await r.json();
            if(d.success) {
                document.getElementById('login-view').style.display='none';
                if(d.role === 'Admin') { document.getElementById('admin-view').style.display='block'; loadAdmin(); }
                else { document.getElementById('teacher-view').style.display='block'; startScanner(); }
            }
        }

        function setMode(m) { curMode = m; }

        function startScanner() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                const p = text.split('|'); if(p.length >= 3) processEntry(p[0], p[1], p[2]);
            });
        }

        function manualSubmit() {
            const n = document.getElementById('man-name').value;
            const h = document.getElementById('man-house').value;
            if(n) processEntry(n, "MANUAL", h);
        }

        async function processEntry(n, d, h) {
            const pts = (curMode === 'Positive' ? 10 : -5);
            sessionScores[h] += pts;
            document.getElementById(`s-${h.toLowerCase()}`).innerText = sessionScores[h];
            document.getElementById('r-name').innerText = n;
            document.getElementById('r-pts').innerText = (pts > 0 ? `+${pts}` : pts);
            document.getElementById('r-pts').style.color = (pts > 0 ? 'green' : 'red');
            document.getElementById('receipt-box').classList.add('show');
            setTimeout(() => document.getElementById('receipt-box').classList.remove('show'), 2000);
            fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'submitPoint', data:{studentName:n, dept:d, house:h, category:document.getElementById('m-category').value, teacherName:document.getElementById('t-name').value, type:curMode}})});
        }

        async function loadAdmin() {
            const r = await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'getAdminData'})});
            const d = await r.json();
            let html = `<h3>🏆 WEEKLY HOUSE STANDINGS</h3>`;
            const labels = ["🥇 Winner", "🥈 Runner", "🥉 2nd Runner"];
            d.weeklyHouses.forEach((h, i) => html += `<div class="glass">${labels[i]}: ${h[0]} (${h[1]} pts)</div>`);
            
            html += `<h3>🏢 ACTIVE DEPT OF WEEK</h3><div class="glass">${d.activeDept.dept} (Weighted Score: ${d.activeDept.score.toFixed(2)})</div>`;

            d.weeklyDeptTo
